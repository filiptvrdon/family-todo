services:
  db:
    image: postgres:17.4-alpine
    container_name: family-todo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: family_todo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d family_todo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
